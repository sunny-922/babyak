version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: babyak-server-db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: babyak
    volumes:
      - babyak_mysql_data:/var/lib/mysql

volumes:
  babyak_mysql_data: